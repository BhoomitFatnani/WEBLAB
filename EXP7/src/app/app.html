<h1>Add New Item</h1>

<form [formGroup]="itemForm" (ngSubmit)="addItem()">

  <label>Title:</label>
  <input formControlName="title">
  <div *ngIf="itemForm.get('title')?.invalid && itemForm.get('title')?.touched">
    Title is required
  </div>

  <label>Description:</label>
  <textarea formControlName="description"></textarea>
  <div *ngIf="itemForm.get('description')?.invalid && itemForm.get('description')?.touched">
    Description is required
  </div>

  <button type="submit" [disabled]="itemForm.invalid">
    Add Item
  </button>

</form>

<h2>Item List</h2>

<ul>
  <li *ngFor="let item of items">
    <b>{{item.title}}</b>
    <p>{{item.description}}</p>
  </li>
</ul>
